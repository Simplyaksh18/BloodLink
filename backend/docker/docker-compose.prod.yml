version: '3.9'

# Production-like stack — no pgadmin, no source mounts, restart always.
# Deploy with: docker compose -f docker/docker-compose.prod.yml up -d
# Secrets must be injected via .env.production or platform env vars (never commit secrets).

services:
  postgres:
    image: postgres:16-alpine
    container_name: bloodlink-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: bloodlink
      POSTGRES_PASSWORD: bloodlink123
      POSTGRES_DB: bloodlink
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-bloodlink} -d ${POSTGRES_DB:-bloodlink}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Do NOT expose 5432 to host in production — API connects via internal network
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: bloodlink-redis-prod
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: bloodlink-api:latest
    container_name: bloodlink-api-prod
    restart: always
    environment:
      NODE_ENV: production
      PORT: '3000'
      API_VERSION: v1
      DATABASE_URL: postgresql://bloodlink:bloodlink123@postgres:5432/bloodlink
      REDIS_URL: "redis://:changeme@redis:6379"
